{% extends 'base.html' %}
{% block content %}
<div style="max-width:520px;margin:0 auto" class="fade-up">
  <p style="font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:var(--neon);margin-bottom:8px">ROSTER</p>
  <h1 style="margin-bottom:8px">ADD <span class="neon-text">PLAYER</span></h1>
  <p style="color:var(--muted);margin-bottom:32px">Register a new player to the tracker</p>
  <div class="card">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div style="text-align:center;margin-bottom:28px">
        <div id="avatar-preview" style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--neon3),var(--neon));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:2px dashed var(--neon);cursor:pointer;overflow:hidden;position:relative" onclick="document.getElementById('avatar-input').click()">
          <span id="avatar-placeholder" style="font-size:32px">📷</span>
          <img id="avatar-img" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0">
        </div>
        <p style="font-size:13px;color:var(--muted)">Click to upload profile picture</p>
        <input type="file" name="avatar" id="avatar-input" accept="image/*" style="display:none" onchange="previewAvatar(this)">
      </div>
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter player username" required autofocus>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:12px;margin-top:8px">CREATE PLAYER →</button>
    </form>
  </div>
  <div style="text-align:center;margin-top:20px">
    <a href="{% url 'dashboard' %}" style="color:var(--muted);font-size:13px;text-decoration:none">← Back to Dashboard</a>
  </div>
</div>
<script>
function previewAvatar(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('avatar-img').src = e.target.result;
      document.getElementById('avatar-img').style.display = 'block';
      document.getElementById('avatar-placeholder').style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>
{% endblock %}
